name: Status Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  status-checks:
    name: Status Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint and format
        run: pnpm run format-and-lint

      - name: Typecheck
        run: pnpm run check-types

      - name: Test
        run: pnpm run test

  docker-smoke:
    name: Docker Smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [scrubjay-discord, scrubjay-portal]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.app }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.app }}:smoke
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      # Catches "works in dev, broken in the image" bugs (e.g. a workspace
      # package symlink that dangles in the runner stage) that no other gate
      # sees. Pass = workspace deps resolve and boot gets past module loading,
      # dying only on the deliberately absent database.
      - name: Smoke-test image
        if: matrix.app == 'scrubjay-discord'
        run: |
          docker run --rm scrubjay-discord:smoke \
            node -e "require('@scrubjay/api-contracts'); console.log('api-contracts resolves OK')"

          output=$(timeout 60 docker run --rm \
            -e DATABASE_URL=postgres://stub:stub@127.0.0.1:5432/stub \
            -e DISCORD_TOKEN=stub \
            -e EBIRD_TOKEN=stub \
            scrubjay-discord:smoke 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -q "Cannot find module"; then
            echo "::error::image is missing modules at runtime"
            exit 1
          fi
          if ! echo "$output" | grep -q "ECONNREFUSED"; then
            echo "::error::boot did not reach the DB connection step"
            exit 1
          fi

      - name: Smoke test portal image
        if: matrix.app == 'scrubjay-portal'
        run: |
          set -o pipefail
          docker run --rm \
            -e DATABASE_URL=postgresql://u:p@127.0.0.1:9/db \
            -e BOT_API_URL=http://127.0.0.1:9 \
            -e SCRUBJAY_API_TOKEN=tttttttttttttttttttttttttttttttt \
            -e BETTER_AUTH_SECRET=ssssssssssssssssssssssssssssssss \
            -e BETTER_AUTH_URL=http://localhost:3100 \
            -e DISCORD_CLIENT_ID=x -e DISCORD_CLIENT_SECRET=y \
            -e PORTAL_OPERATOR_IDS=123456789012345678 \
            scrubjay-portal:smoke 2>&1 | tee smoke.log || true
          grep -q "ECONNREFUSED" smoke.log
          ! grep -q "Cannot find module" smoke.log
